<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/">

    <title>Utildex - Modular Toolbox</title>
    <meta name="theme-color" content="#3b82f6" />

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://utildex.com/">
    <meta property="og:title" content="Utildex - Local-First Modular Toolbox">
    <meta property="og:description" content="A modular collection of independent utilities that run entirely in your browser. Private, offline-ready, and open source.">
    <meta property="og:image" content="https://utildex.com/assets/images/preview-banner.jpg">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://utildex.com/">
    <meta property="twitter:title" content="Utildex - Local-First Modular Toolbox">
    <meta property="twitter:description" content="A modular collection of independent utilities that run entirely in your browser.">
    <meta property="twitter:image" content="https://utildex.com/assets/images/preview-banner.jpg">

    <link
            rel="icon"
            type="image/webp"
            href="/assets/images/utildex_favicon_64x64.webp"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Non-blocking Font Loading -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400..800&family=Roboto+Mono:wght@400;500&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400..800&family=Roboto+Mono:wght@400;500&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" media="print" onload="this.media='all'" />
    <noscript>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400..800&family=Roboto+Mono:wght@400;500&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" />
    </noscript>

</head>

<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 transition-colors duration-300 overflow-x-hidden">
<script>
    // Critical Theme Init - Runs before paint to prevent flash and allow correct App Shell rendering
    (function() {
        try {
            const saved = localStorage.getItem('utildex-state-theme'); // Updated key
            const isDark = saved === 'true' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches);
            if (isDark) {
                document.documentElement.classList.add('dark');
            }
        } catch (e) {}
    })();
</script>
<app-root>
    <!-- 
      APP SHELL: Static HTML that perfectly matches the Angular layout.
      This allows LCP to fire immediately (~0.5s) instead of waiting for JS bundle (~3.0s).
      It uses inline styles that map exactly to your Tailwind classes to ensure visual consistency
      during the 'hydration' phase.
    -->
    <div style="
        position: fixed; top: 0; left: 0; right: 0; height: 64px; 
        display: flex; align-items: center; justify-content: space-between;
        padding: 0 1.5rem; border-bottom: 1px solid;
        z-index: 40;
        background-color: var(--bg-color, #f8fafc);
        border-color: var(--border-color, #e2e8f0);
    ">
        <style>
            :root { --bg-color: #ffffff; --border-color: #e2e8f0; --text-primary: #0f172a; --text-secondary: #475569; }
            .dark :root { --bg-color: #0f172a; --border-color: #1e293b; --text-primary: #f8fafc; --text-secondary: #94a3b8; }
            /* Tailwind mappings */
            .dark body { background-color: #020617; color: #f1f5f9; } 
            /* Shell specific overrides */
            html.dark .shell-wrapper { background-color: #020617; color: #f1f5f9; }
            html.dark .shell-header { background-color: #0f172a; border-color: #1e293b; }
            html:not(.dark) .shell-wrapper { background-color: #f8fafc; color: #0f172a; }
            html:not(.dark) .shell-header { background-color: #ffffff; border-color: #e2e8f0; }
        </style>

        <div class="shell-header" style="display: flex; align-items: center; gap: 0.75rem;">
            <div style="width: 2.25rem; height: 2.25rem; border-radius: 0.5rem; background-color: currentColor; opacity: 0.2;"></div>
            <span style="font-weight: 700; font-size: 1.25rem; font-family: 'Inter', sans-serif;">Utildex</span>
        </div>
    </div>

    <div class="shell-wrapper" style="
        min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding-top: 8rem;
    ">
        <!-- Hero Title (LCP Element) -->
        <h1 style="
            font-size: 3rem; font-weight: 800; text-align: center; margin-bottom: 1.5rem; letter-spacing: -0.025em;
            font-family: 'Inter', sans-serif;
        ">
            Modular Developer Toolbox
        </h1>
    </div>
</app-root>
</body>
</html>
